name: TFR Sync

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync TFRs from AeroAPI
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run TFR sync
        run: npx ts-node scripts/syncTFRs.ts
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AEROAPI_KEY:  ${{ secrets.AEROAPI_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "TFR sync failed at $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "Check AeroAPI status and DATABASE_URL secret" >> $GITHUB_STEP_SUMMARY
